<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Bokashi Composter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 50%, #bbf7d0 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="bg-white rounded-2xl shadow-xl p-10 w-full max-w-md">

        <!-- Logo -->
        <div class="flex flex-col items-center mb-8">
            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mb-4">
                <i class="fas fa-leaf text-green-600 text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Bokashi Manager</h1>
            <p class="text-sm text-gray-500 mt-1">Enter your passphrase to continue</p>
        </div>

        <!-- Error -->
        {% if error %}
        <div class="mb-5 flex items-center gap-3 bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm">
            <i class="fas fa-exclamation-triangle"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <!-- Form -->
        <form method="POST" action="/login">
            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    Passphrase
                </label>
                <div class="relative">
                    <input
                        type="password"
                        name="passphrase"
                        id="passphrase"
                        autofocus
                        required
                        placeholder="Enter the passphrase"
                        class="w-full px-4 py-3 pr-12 border border-gray-300 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none transition text-gray-800"
                    >
                    <button type="button"
                            onclick="togglePassword()"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                        <i id="eyeIcon" class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit"
                    class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-semibold transition text-base">
                <i class="fas fa-sign-in-alt mr-2"></i>Access Dashboard
            </button>
        </form>

        <p class="text-center text-xs text-gray-400 mt-8">
            Bokashi Composter v1.0 &nbsp;·&nbsp; IoT Monitoring System
        </p>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('passphrase');
            const icon  = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
